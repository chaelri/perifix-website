name: Keep Supabase Edge Functions warm

# Supabase hibernates Edge Functions after a few minutes of inactivity. The
# first call after a cold pause adds 1-3s to admin actions like Approve. This
# workflow pings the function every 5 minutes so the runtime stays warm.
#
# Required repo secrets:
#   SUPABASE_URL       — e.g. https://abcd1234.supabase.co
#   SUPABASE_ANON_KEY  — the anon public key (already shipped in the frontend
#                         bundle, so it is not actually secret, but storing it
#                         here keeps it out of the workflow file)

on:
  schedule:
    # Every 5 minutes. GitHub may add jitter; that is fine for a warm-keep.
    - cron: "*/5 * * * *"
  workflow_dispatch: # allow manual ping for debugging

concurrency:
  group: keep-supabase-warm
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping edge functions
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_ANON_KEY repo secrets"
            exit 1
          fi
          # GET requests are short-circuited inside each function (no auth/db),
          # so the pings are essentially free.
          for fn in approve-account reset-user-password; do
            echo "Pinging $fn"
            curl -fsS \
              -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
              -H "apikey: $SUPABASE_ANON_KEY" \
              "$SUPABASE_URL/functions/v1/$fn"
            echo
          done
